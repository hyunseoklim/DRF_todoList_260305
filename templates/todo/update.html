{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container">
    <h2>Todo 수정</h2>

    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" value="{{ todo.name }}">
    </div>

    <div>
        <label for="description">Description:</label>
        <textarea id="description">{{ todo.description }}</textarea>
    </div>

    <div>
        <label for="complete">Complete:</label>
        <input type="checkbox" id="complete" {% if todo.complete %}checked{% endif %}>
    </div>

    <div>
        <label for="exp">Experience Points:</label>
        <input type="number" id="exp" min="0" value="{{ todo.exp }}">
    </div>

    <!-- ✅ 현재 이미지 미리보기 -->
    <div>
        <label>Current Image:</label><br>
        {% if todo.image %}
        <img src="{{ todo.image.url }}" alt="todo image" style="max-width:250px;">
        {% else %}
        <p>-</p>
        {% endif %}
    </div>

    <!-- ✅ 새 이미지 업로드 -->
    <div>
        <label for="image">New Image:</label>
        <input type="file" id="image">
    </div>

    <button type="button" id="todoUpdate">저장</button>
    <button type="button" onclick="history.back()">취소</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {

        // 로그인 페이지 URL
        const LOGIN_PAGE_URL = "/login/";
        const todoId = "{{ todo.id }}";

        // axios 인스턴스 생성 (세션 쿠키 포함)
        const api = axios.create({
            baseURL: "/",
            withCredentials: true,
        });

        // 요청 인터셉터: CSRF 토큰 자동 주입
        api.interceptors.request.use(config => {
            const csrfToken = document.cookie
                .split("; ")
                .find(row => row.startsWith("csrftoken="))
                ?.split("=")[1];
            config.headers = config.headers || {};
            if (csrfToken) {
                config.headers["X-CSRFToken"] = csrfToken;
            }
            return config;
        });

        // 응답 인터셉터: 인증 실패 시 로그인 이동
        api.interceptors.response.use(
            res => res,
            err => {
                const status = err.response?.status;
                if (status === 401 || status === 403) {
                    alert("로그인이 필요합니다.");
                    window.location.href = LOGIN_PAGE_URL;
                }
                return Promise.reject(err);
            }
        );

        // 저장 버튼 클릭 이벤트
        document.getElementById("todoUpdate").addEventListener("click", async () => {
            try {
                const formData = new FormData();
                formData.append("name", document.getElementById("name").value);
                formData.append("description", document.getElementById("description").value);
                // 체크박스 값을 문자열로 변환
                formData.append("complete", document.getElementById("complete").checked ? "true" : "false");
                formData.append("exp", document.getElementById("exp").value || 0);
                // 새 이미지가 선택된 경우에만 추가
                const fileInput = document.getElementById("image");
                if (fileInput.files.length > 0) {
                    formData.append("image", fileInput.files[0]);
                }
                // PATCH 요청 (ViewSet URL에 맞게 수정)
                const res = await api.patch(`/todo/viewsets/view/${todoId}/`, formData);
                window.location.href = `/todo/detail/${todoId}/`;
            } catch (err) {
                console.error("수정 실패:", err.response?.data || err.message);
                alert("수정 실패");
            }
        });
    });
</script>

{% endblock %}
